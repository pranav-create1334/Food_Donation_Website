# Food Donation - Production Configuration
spring.application.name=Food_Donation

# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/

# MySQL Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:${DB_URL:jdbc:mysql://localhost:3306/food_donation?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USER:root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.initialization-fail-timeout=0

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
spring.jpa.open-in-view=false
spring.data.jpa.repositories.bootstrap-mode=lazy
spring.main.lazy-initialization=true

# JWT Configuration
app.jwt.secret=${APP_JWT_SECRET:${JWT_SECRET:foodDonationSuperSecretKeyForJwtTokenGeneration2026}}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:${JWT_EXPIRATION_MS:86400000}}

# CORS
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://localhost:5173,http://localhost:8080,https://food-donation-website-amqz.onrender.com,https://food-donation-website-*.vercel.app}

# Logging
logging.level.root=INFO
logging.level.food.donation=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
