spring.application.name=Food_Donation

server.port=${PORT:8080}

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/food_donation?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT
app.jwt.secret=${APP_JWT_SECRET:${JWT_SECRET:foodDonationSuperSecretKeyForJwtTokenGeneration2026}}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:${JWT_EXPIRATION_MS:86400000}}

# CORS
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://localhost:5173,http://localhost:8080,https://food-donation-website-amqz.onrender.com,https://food-donation-website-*.vercel.app}
